server:
  port: ${CHAT_SERVER_PORT:8081}

spring:
  application:
    name: chat-server
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

aws:
  region: ${AWS_REGION:ap-northeast-2}
  dynamodb:
    enabled: ${AWS_DYNAMODB_ENABLED:true}

chat:
  auth:
    cache-ttl-hours: 24
    device-token-key-prefix: ${CHAT_DEVICE_TOKEN_KEY_PREFIX:device-token:}

logging:
  level:
    root: WARN
    com.foodgroup.chat: INFO
