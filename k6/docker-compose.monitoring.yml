version: '3.8'

# k6 부하 테스트 모니터링 스택
# InfluxDB v1 (k6 기본 지원) + Grafana
#
# 실행: docker compose -f k6/docker-compose.monitoring.yml up -d
# 종료: docker compose -f k6/docker-compose.monitoring.yml down -v

services:

  influxdb:
    image: influxdb:1.8
    container_name: k6-influxdb
    ports:
      - "8086:8086"
    environment:
      INFLUXDB_DB: k6
      INFLUXDB_HTTP_AUTH_ENABLED: "false"
    volumes:
      - influxdb_data:/var/lib/influxdb
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: k6-grafana
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      # 시작 시 InfluxDB datasource 자동 등록
      GF_DATASOURCES_DEFAULT_NAME: InfluxDB
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
    depends_on:
      - influxdb
    restart: unless-stopped

volumes:
  influxdb_data:
  grafana_data:
