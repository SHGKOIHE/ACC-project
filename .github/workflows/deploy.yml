name: Deploy Core Backend

on:
  push:
    branches: [main]
    paths: [backend/**]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Build & Test
        run: cd backend && ./gradlew build

      - name: Security Scan - Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Lambda JAR
        run: cd backend && ./gradlew bootJar --no-daemon

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-northeast-2

      - name: Upload JAR to S3
        run: |
          JAR=$(ls backend/build/libs/*.jar | head -1)
          aws s3 cp "$JAR" s3://food-app-assets-sj/lambda/foodgroup-backend.jar

      - name: Update Lambda Function Code
        run: |
          aws lambda update-function-code \
            --function-name foodgroup-backend \
            --s3-bucket food-app-assets-sj \
            --s3-key lambda/foodgroup-backend.jar \
            --region ap-northeast-2

      - name: Wait for Lambda Update
        run: |
          aws lambda wait function-updated \
            --function-name foodgroup-backend \
            --region ap-northeast-2

      - name: Verify Lambda Health
        run: |
          RESULT=$(aws lambda invoke \
            --function-name foodgroup-backend \
            --payload '{"httpMethod":"GET","path":"/api/rooms","headers":{},"queryStringParameters":null,"body":null}' \
            --region ap-northeast-2 \
            /tmp/lambda-response.json 2>&1)
          STATUS=$(python3 -c "import json; print(json.load(open('/tmp/lambda-response.json')).get('statusCode', 0))" 2>/dev/null || echo "0")
          echo "Lambda response status: $STATUS"
          [ "$STATUS" = "401" ] || [ "$STATUS" = "200" ] || [ "$STATUS" = "403" ] && echo "Lambda OK" || exit 1
