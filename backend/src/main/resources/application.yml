spring:
  application:
    name: foodgroup-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}


management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

fcm:
  enabled: ${FCM_ENABLED:false}
  credentials-path: ${FCM_CREDENTIALS_PATH:classpath:firebase-service-account.json}

auth:
  device-token:
    key-prefix: ${AUTH_DEVICE_TOKEN_KEY_PREFIX:device-token:}
    ttl-hours: ${AUTH_DEVICE_TOKEN_TTL_HOURS:24}

ai:
  lambda:
    function-name: ${AI_LAMBDA_FUNCTION_NAME:food-recommend-api}
    internal-key: ${AI_LAMBDA_INTERNAL_KEY:dev-secret}

aws:
  region: ${AWS_REGION:ap-northeast-2}
  dynamodb:
    enabled: ${AWS_DYNAMODB_ENABLED:true}
  ses:
    enabled: ${AWS_SES_ENABLED:false}
    from-email: ${AWS_SES_FROM_EMAIL:noreply@foodgroup.com}
  s3:
    enabled: ${AWS_S3_ENABLED:false}
    bucket-name: ${AWS_S3_BUCKET_NAME:foodgroup-bucket}
  cloudwatch:
    enabled: ${AWS_CLOUDWATCH_ENABLED:false}
    log-group: ${AWS_CLOUDWATCH_LOG_GROUP:/foodgroup/backend}
    log-stream: ${AWS_CLOUDWATCH_LOG_STREAM:app}

websocket:
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:*}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
