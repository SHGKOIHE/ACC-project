spring:
  application:
    name: foodgroup-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:local}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized

fcm:
  enabled: ${FCM_ENABLED:false}
  credentials-path: ${FCM_CREDENTIALS_PATH:classpath:firebase-service-account.json}

ai:
  lambda:
    function-url: ${AI_LAMBDA_FUNCTION_URL:http://localhost:8081/mock}
    internal-key: ${AI_LAMBDA_INTERNAL_KEY:dev-secret}

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
