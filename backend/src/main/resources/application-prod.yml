spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
  data:
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: validate

encryption:
  key: ${ENCRYPTION_KEY}

logging:
  level:
    com.foodgroup: INFO
  file:
    name: /var/log/foodgroup/app.log
  logback:
    rollingpolicy:
      max-history: 30
      max-file-size: 50MB
