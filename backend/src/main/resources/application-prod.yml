encryption:
  key: ${ENCRYPTION_KEY}

aws:
  region: ${AWS_REGION:ap-northeast-2}
  dynamodb:
    enabled: true
  ses:
    enabled: true

fcm:
  enabled: true

logging:
  level:
    com.foodgroup: INFO
  file:
    name: /var/log/foodgroup/app.log
  logback:
    rollingpolicy:
      max-history: 30
      max-file-size: 50MB
